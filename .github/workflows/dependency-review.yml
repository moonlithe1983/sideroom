name: Dependency Review

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Check whether dependency review is supported
        id: support
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          status_code="$(curl -sS -o /tmp/dependency-graph-sbom.json -w '%{http_code}' \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/dependency-graph/sbom")"

          if [ "$status_code" = "200" ]; then
            echo "supported=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "supported=false" >> "$GITHUB_OUTPUT"
          echo "Dependency review skipped because GitHub dependency graph is not available for this repository." >> "$GITHUB_STEP_SUMMARY"
          echo "Enable Dependency graph in repository settings if you want the dependency-review action to run." >> "$GITHUB_STEP_SUMMARY"
          echo "::warning::Dependency review skipped because GitHub dependency graph is unavailable for this repository."

      - name: Review dependency changes
        if: steps.support.outputs.supported == 'true'
        uses: actions/dependency-review-action@v4.8.2
